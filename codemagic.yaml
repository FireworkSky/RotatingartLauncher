# ===================================================================
# CODEMAGIC CI/CD CONFIGURATION FOR RALAUNCHER (TURBO LINUX)
# ===================================================================
workflows:
  android-release-workflow:
    name: RotatingartLauncher Release Build
    
    # 🏎️ ENGINE SWAP: Switch to standard Linux machine. 
    # Android builds natively on Linux, which makes NDK/C++ compilation MUCH faster
    # and avoids any macOS virtualization overhead.
    instance_type: linux
    
    environment:
      java: 17
    
    scripts:
      - name: 🥷 The Ultimate LFS Bypass (Wget)
        script: |
          echo "Bypassing Git LFS entirely..."
          
          # Force remove the LFS pointer file
          rm -f app/src/main/assets/MonoMod.zip
          
          # Download the REAL zip file directly from Github's raw media server
          wget -O app/src/main/assets/MonoMod.zip "https://media.githubusercontent.com/media/WinterWolfVN/RotatingartLauncher/main/app/src/main/assets/MonoMod.zip"
          
          echo "✅ MonoMod.zip successfully injected into assets!"

      - name: 🔑 Generate Dummy Keystore
        script: |
          echo "Forging a dummy keystore to sign the APK..."
          keytool -genkeypair -v -keystore app/dummy.keystore -alias ralaunch -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=MobileHacker, OU=Dev, O=RaLaunch, C=VN"
          echo "✅ Dummy Keystore forged successfully!"

      - name: 🔨 Build Android Release APK
        script: |
          echo "Starting Gradle Build Process on Linux..."
          
          # Enable Gradle Daemon and parallel building to maximize CPU usage
          export GRADLE_OPTS="-Dorg.gradle.daemon=true -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4"
          
          chmod +x gradlew
          ./gradlew assembleRelease
          
          echo "✅ APK Built Successfully!"

    artifacts:
      - app/build/outputs/apk/release/*.apk
