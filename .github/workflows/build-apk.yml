name: RotatingartLauncher

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: false
          submodules: false

      - name: Disable Git LFS Globally & Fetch Submodules Safely
        run: |
          # 1. Kill LFS completely before touching submodules
          git config --global filter.lfs.smudge "git-lfs smudge --skip -- %f"
          git config --global filter.lfs.process "git-lfs filter-process --skip"
          
          # 2. Now manually fetch Submodules safely without LFS crashes
          git submodule sync
          git submodule update --init --recursive --depth 1 || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inject Heavy LFS Files via Wget
        run: |
          echo "Setting up assets directory..."
          mkdir -p app/src/main/assets/
          cd app/src/main/assets/
          
          echo "Purging corrupted/locked LFS pointers..."
          rm -f MonoMod.zip runtime_libs.tar.xz dotnet.tar.xz
          
          echo "📥 Initiating direct download from Upstream (WinterWolfVN)..."
          
          echo "Downloading MonoMod.zip..."
          wget -q -O MonoMod.zip "https://github.com/WinterWolfVN/RotatingartLauncher/raw/refs/heads/main/app/src/main/assets/MonoMod.zip"
          
          echo "Downloading runtime_libs.tar.xz..."
          wget -q -O runtime_libs.tar.xz "https://github.com/WinterWolfVN/RotatingartLauncher/raw/refs/heads/main/app/src/main/assets/runtime_libs.tar.xz"
          
          echo "Downloading dotnet.tar.xz..."
          wget -q -O dotnet.tar.xz "https://github.com/WinterWolfVN/RotatingartLauncher/raw/refs/heads/main/app/src/main/assets/dotnet.tar.xz"
          
          echo "🔍 Verifying payload integrity..."
          ls -lh
          
          echo "✅ All required payloads successfully acquired!"

      - name: Fetch Submodules Manually (SDL, MojoShader)
        run: |
          echo "Initiating manual submodule synchronization..."
          git submodule sync
          
          # 1. Fetch other submodules (FAudio, FNA3D, etc.) normally
          git submodule update --init --recursive || true
          
          # 2. THE BULLDOZER: Forcefully replace the broken SDL submodule
          echo "Purging corrupted SDL submodule..."
          rm -rf app/src/main/cpp/SDL/*
          rm -rf app/src/main/cpp/SDL/.git*
          
          echo "Downloading STABLE SDL2 release source code..."
          # Download official SDL 2.28.5 (Highly stable for Android/CMake)
          wget -q -O sdl.tar.gz "https://github.com/libsdl-org/SDL/archive/refs/tags/release-2.28.5.tar.gz"
          
          echo "Extracting SDL payload..."
          tar -xzf sdl.tar.gz
          
          echo "Moving payload into place..."
          cp -r SDL-release-2.28.5/* app/src/main/cpp/SDL/
          
          echo "Verifying SDL source directory integrity..."
          ls -la app/src/main/cpp/SDL/CMakeLists.txt || echo "❌ FATAL: SDL CMakeLists.txt still missing!"
          
      - name: Forge Dummy Keystore
        run: |
          keytool -genkeypair -v -keystore app/dummy.keystore -alias ralaunch -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=MobileHacker, OU=Dev, O=RaLaunch, C=VN"

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Find, Zipalign and Sign APK
        run: |
          echo "Locating the compiled unsigned/aligned APK..."
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "Found APK at: $APK_PATH"
          
          echo "Setting up Android Build Tools..."
          BUILD_TOOLS_PATH="$ANDROID_HOME/build-tools/34.0.0"
          
          echo "Zipaligning the APK for memory optimization..."
          $BUILD_TOOLS_PATH/zipalign -v -p 4 $APK_PATH app/build/outputs/apk/release/aligned.apk
          
          echo "Signing the APK and renaming to RAL_release.apk..."
          $BUILD_TOOLS_PATH/apksigner sign --ks app/dummy.keystore --ks-pass pass:123456 --ks-key-alias ralaunch --key-pass pass:123456 --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true --out app/build/outputs/apk/release/RAL_release.apk app/build/outputs/apk/release/aligned.apk
          
          echo "✅ APK successfully aligned, signed, and renamed!"

      - name: Upload Final Signed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RaLaunch-Release-Signed
          path: app/build/outputs/apk/release/RAL_release.apk
